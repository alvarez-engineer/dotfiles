name: check

on:
  push:
  pull_request:

# The gate only reads the tree. Public repos get a token on every run, so drop
# it to read-only rather than inheriting the repository default.
permissions:
  contents: read

# Pin the linters. Distro packages disagree: apt shipped shellcheck 0.9 while
# brew shipped 0.11, so a run could pass on one leg and fail on the other for a
# check that has nothing to do with the platform (SC2015 did exactly this).
# Pinning also means `make check` locally and in CI are the same gate — bump
# these deliberately, not by whichever mirror updated first.
#
# LUA_VERSION is pinned too, not just LUACHECK_VERSION: luacheck 1.2.0 does not
# run on Lua 5.5 (it assigns to a variable 5.5 made const), and brew's luarocks
# defaults to 5.5. Pinning the tool without pinning its interpreter is only half
# a pin.
env:
  SHELLCHECK_VERSION: "0.11.0"
  LUACHECK_VERSION: "1.2.0"
  LUA_VERSION: "5.4"

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS is half the repo's promise; lint it there too. Several bugs this
        # gate now catches were macOS-only (BSD ls, Homebrew paths).
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Install zsh, Lua and luarocks (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh "lua${LUA_VERSION}" "liblua${LUA_VERSION}-dev" luarocks

      - name: Install Lua and luarocks (macOS)
        if: runner.os == 'macOS'
        # zsh is the default shell on macOS runners; nothing to install for it.
        # lua@5.4 is keg-only, so luarocks needs to be pointed at it explicitly
        # in the next step -- brew's luarocks otherwise builds against Lua 5.5.
        run: brew install "lua@${LUA_VERSION}" luarocks

      - name: Install pinned shellcheck
        run: |
          set -euo pipefail
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          case "$(uname -m)" in
            aarch64|arm64) arch="aarch64" ;;
            x86_64|amd64)  arch="x86_64" ;;
            *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          url="https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.${os}.${arch}.tar.xz"
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL "$url" | tar -xJ -C "$RUNNER_TEMP"
          mv "$RUNNER_TEMP/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" "$RUNNER_TEMP/bin/"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install pinned luacheck
        run: |
          set -euo pipefail
          args=(--lua-version "$LUA_VERSION")
          if [ "$RUNNER_OS" = "macOS" ]; then
            args+=(--lua-dir "$(brew --prefix "lua@${LUA_VERSION}")")
          fi
          luarocks "${args[@]}" install --local luacheck "$LUACHECK_VERSION"
          echo "$HOME/.luarocks/bin" >> "$GITHUB_PATH"

      - name: Show linter versions
        # If a leg ever disagrees with the other, this is the first place to look.
        # It also guards the gate: `make check` skips a linter that is absent, so
        # a silently-failed install above would let the gate pass having checked
        # nothing. This step runs under `bash -e`, so a missing binary fails here.
        run: |
          shellcheck --version | sed -n 's/^version: /shellcheck /p'
          luacheck --version | head -1
          zsh --version

      - name: Run checks
        run: make check
