# Managed tmux.conf — symlinked from the dotfiles repo (tmux module).
# Themed to match the Ghostty "muted-ink" palette.

# --- Prefix: Ctrl-a (easier reach than Ctrl-b), keep C-b as fallback ---
set -g prefix C-a
bind C-a send-prefix
unbind C-b

# --- General behaviour ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-ghostty:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g set-clipboard on
setw -g mode-keys vi
set -g status-keys emacs

# --- Reload ---
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# --- Splits: keep the current path, intuitive keys ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation (vim-style) and resizing ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode (vi) ---
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# =====================================================================
# muted-ink theme
# =====================================================================
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#0d1117,fg=#c9d1d9"

set -g status-left-length 30
set -g status-left "#[bg=#7aa2a5,fg=#0d1117,bold] #S #[bg=#0d1117,fg=#7aa2a5] "

set -g status-right-length 80
set -g status-right "#[fg=#6b7280]#{?client_prefix,#[fg=#b8a06a]^A ,}#[fg=#6b7280]%Y-%m-%d #[fg=#7aa2a5]%H:%M #[bg=#263241,fg=#c9d1d9] #h "

setw -g window-status-format "#[fg=#6b7280] #I:#W "
setw -g window-status-current-format "#[bg=#263241,fg=#7dabab,bold] #I:#W#{?window_zoomed_flag,*,} "
setw -g window-status-separator ""

set -g pane-border-style "fg=#263241"
set -g pane-active-border-style "fg=#7aa2a5"

set -g message-style "bg=#263241,fg=#e6edf3"
set -g mode-style "bg=#263241,fg=#e6edf3"

set -g display-panes-active-colour "#7aa2a5"
set -g display-panes-colour "#4b5563"
